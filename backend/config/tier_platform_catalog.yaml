# 算力档位客户标价、第三方平台成本及档位 → 上游实例类型映射。
# 与 backend/domain/task_enums.py 中 PriorityType（lite/default/plus）、
# ThirdPartyPlatform 对齐。

version: 1
pricing_version: "2026-05-mvp"

# 产品档位：内部键 ↔ 中文名 ↔ 客户标价（美元/秒，字符串便于 Decimal）
priority_tiers:
  lite:
    display_name_zh: "普通"
    enabled: true
    price_per_second_usd: "0.000200000"
  default:
    display_name_zh: "标准"
    enabled: true
    price_per_second_usd: "0.000720000"
  plus:
    display_name_zh: "优先"
    enabled: true
    price_per_second_usd: "0.001400000"

# 已接入或可扩展的第三方算力平台
platforms:
  runninghub:
    display_name_zh: "RunningHub"
    enabled: true
    # 平台档位：本系统 priority_type → RH instanceType，并记录内部成本价。
    # cost_per_second_usd 按 RH 人民币小时价折算：CNY/hour ÷ 3600 ÷ USD_CNY。
    priority_tiers:
      lite:
        # 空字符串：请求体不传 instanceType，走平台默认（最便宜档）
        instance_type: ""
        cost_per_second_usd: "0.000016332"
      default:
        # 内部 `default`（标准）对应 RH 的 standard 档。
        instance_type: "standard"
        cost_per_second_usd: "0.000163317"
      plus:
        instance_type: "plus"
        cost_per_second_usd: "0.000244976"
