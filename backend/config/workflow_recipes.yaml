# 任务类型 → 第三方工作流配方注册表
# Worker 按 (third_party_platform, task_type) 查找配方，将 input_payload 中的
# 用户级语义参数翻译为 RunningHub API 参数。
#
# 规则：
#   workflow_id: 字符串 = 固定 workflow；null = 从 input_payload.workflow_id 取
#   nodes:       dict   = 按配方翻译；null = 从 input_payload.node_info_list 透传
#   nodes.<key>:
#     node_id    — RH workflow 中的节点 ID
#     field_name — RH 节点字段名
#     upload     — true: input_payload 中该字段的值是文件 URL，需先 upload_media
#                  false: 直接透传为 field_value

version: 1

recipes:
  face_swap:
    platform: runninghub
    workflow_id: "2054464837232668674"
    description: "AI 换脸"
    estimated_runtime_seconds: 250
    nodes:
      face_image_1:
        node_id: "45"
        field_name: "image"
        upload: true
      face_image_2:
        node_id: "46"
        field_name: "image"
        upload: true
      face_image_3:
        node_id: "47"
        field_name: "image"
        upload: true
      face_image_4:
        node_id: "48"
        field_name: "image"
        upload: true
      target_image:
        node_id: "70"
        field_name: "image"
        upload: true
      restore:
        node_id: "262"
        field_name: "value"
        upload: false

  # 去水印
  remove_watermark:
    platform: runninghub
    workflow_id: "2054766030395854850"
    description: "RunningHub 去水印"
    estimated_runtime_seconds: 300
    nodes:
      image:
        node_id: "78"
        field_name: "image"
        upload: true
      prompt:
        node_id: "103"
        field_name: "prompt"
        upload: false
