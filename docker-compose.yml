services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eshow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-eshow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eshow}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-eshow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eshow}"
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./dataset:/dataset:ro
    ports:
      - "${PORT:-8000}:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-eshow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eshow}"
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./dataset:/dataset:ro
    command:
      [
        "sh",
        "-c",
        "uv run alembic upgrade head && uv run celery -A backend.workers.celery_app:celery_app worker -l info -Q compute",
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker_poll:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-eshow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-eshow}"
      CELERY_BROKER_URL: redis://redis:6379/0
    command:
      [
        "sh",
        "-c",
        "uv run celery -A backend.workers.celery_app:celery_app worker -l info -Q maintenance",
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    command:
      [
        "sh",
        "-c",
        "uv run celery -A backend.workers.celery_app:celery_app beat -l info",
      ]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
